name: Build and Release LSP
# Call the action with: git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
            # Para Apple Silicon se necesita cross-compilation desde Intel.
            # Usamos `rustup target add aarch64-apple-darwin` en macOS.
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build LSP
        run: cargo build --release --target ${{ matrix.target }}
        working-directory: ls

      - name: Rename binary with target triple
        run: |
          mv ls/target/${{ matrix.target }}/release/codetrackr-ls \
             ls/target/${{ matrix.target }}/release/codetrackr-ls-${{ matrix.target }}

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: ls/target/${{ matrix.target }}/release/codetrackr-ls-${{ matrix.target }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
